<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>十字路口·公众号排版</title>
  <link rel="icon" href="/logo.png">
  <style>
    :root {
      --green: #407600;
      --green-dark: #356200;
      --green-light: #f4f9ed;
      --green-border: #c5e0a5;
      --dark: #1a1a1a;
      --gray: #666;
      --gray-light: #f7f7f7;
      --border: #e5e5e5;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif; background: #f0f2f5; color: var(--dark); min-height: 100vh; }

    /* ── 登录页 ── */
    .login-page {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background: linear-gradient(135deg, #f4f9ed 0%, #e8f0de 100%);
    }
    .login-box {
      background: #fff; border-radius: 16px; padding: 48px 40px; width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .login-box .logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
    .login-box .logo img { width: 48px; height: 48px; border-radius: 12px; }
    .login-box .logo span { font-size: 20px; font-weight: 700; color: var(--dark); }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; outline: none; margin-bottom: 12px; transition: border .2s;
    }
    .login-box input:focus { border-color: var(--green); }
    .login-box .btn-login {
      width: 100%; padding: 12px; background: var(--green); color: #fff; border: none;
      border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 8px; transition: background .2s;
    }
    .login-box .btn-login:hover { background: var(--green-dark); }
    .login-box .error { color: #d32; font-size: 13px; margin-top: 8px; display: none; }

    /* ── 主布局 ── */
    .app { display: none; }
    .header {
      background: #fff; border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left img { width: 32px; height: 32px; border-radius: 8px; }
    .header-left .brand { font-size: 16px; font-weight: 700; color: var(--dark); }

    /* Tab 导航 */
    .header-tabs { display: flex; gap: 0; margin-left: 32px; height: 56px; }
    .tab-btn {
      background: none; border: none; cursor: pointer; padding: 0 20px; font-size: 14px;
      color: #888; border-bottom: 3px solid transparent; transition: color .2s, border-color .2s; outline: none;
    }
    .tab-btn:hover { color: var(--green); }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }

    .header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--gray); }
    .header-right .username { font-weight: 600; color: var(--dark); }
    .header-right .admin-badge { background: var(--green); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .btn-text { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 13px; text-decoration: none; }
    .btn-text:hover { color: var(--dark); }

    /* Tab 面板 */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 发布 Tab：双栏 ── */
    .content { display: flex; gap: 20px; max-width: 1200px; margin: 24px auto; padding: 0 24px; min-height: calc(100vh - 104px); }
    .col-left { flex: 0 0 420px; }
    .col-right { flex: 1; min-width: 0; }
    @media (max-width: 900px) {
      .content { flex-direction: column; }
      .col-left { flex: none; }
    }

    /* ── 卡片 ── */
    .card {
      background: #fff; border-radius: 12px; padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; color: var(--dark); }
    .card h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--dark); }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    .field input, .field select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; outline: none; transition: border .2s; font-family: inherit;
    }
    .field input:focus, .field select:focus { border-color: var(--green); }

    .url-input {
      font-size: 15px !important; padding: 14px 16px !important;
      border: 2px solid var(--border) !important; border-radius: 10px !important;
    }
    .url-input:focus { border-color: var(--green) !important; box-shadow: 0 0 0 3px rgba(64,118,0,.1); }

    .btn-publish {
      width: 100%; padding: 14px; color: #fff; border: none; position: relative; overflow: hidden;
      border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 4px; transition: all .2s; letter-spacing: .5px;
      background: var(--green); z-index: 1;
    }
    .btn-publish:hover { background: var(--green-dark); }
    .btn-publish:disabled { cursor: not-allowed; }
    .btn-publish .progress-fill {
      position: absolute; top: 0; left: 0; height: 100%; width: 0;
      background: var(--green-dark); transition: width .4s ease; z-index: -1;
    }
    .btn-publish.publishing { background: #b8d4a0; }
    .btn-publish.publishing .progress-fill { background: var(--green); }

    .publish-log {
      margin-top: 10px; font-size: 12px; color: var(--gray); min-height: 20px;
      font-family: 'SF Mono', Monaco, Consolas, monospace; line-height: 1.6;
      max-height: 80px; overflow-y: auto;
    }
    .publish-log .log-line { display: flex; gap: 6px; align-items: baseline; }
    .publish-log .log-time { color: #bbb; flex-shrink: 0; }
    .publish-log .log-msg { color: var(--dark); }

    .status-bar {
      margin-top: 14px; padding: 12px 16px; border-radius: var(--radius); font-size: 13px;
      line-height: 1.6; display: none;
    }
    .status-bar.loading { display: block; background: #f0f7ff; color: #1a6; }
    .status-bar.success { display: block; background: var(--green-light); color: var(--green); }
    .status-bar.error   { display: block; background: #fff0f0; color: #c00; }

    /* ── 日志表格 ── */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 8px 8px; border-bottom: 2px solid var(--border); color: var(--gray); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
    td { padding: 8px 8px; border-bottom: 1px solid var(--gray-light); vertical-align: middle; }
    tr:hover td { background: #fafffe; }
    .tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .tag-ok  { background: #e6f9e6; color: #270; }
    .tag-err { background: #fee; color: #a00; }
    .tag-del { background: #f5f5f5; color: #999; }
    .btn-del-draft {
      padding: 3px 8px; border: 1px solid #ddd; border-radius: 4px; background: #fff;
      color: var(--gray); font-size: 11px; cursor: pointer; white-space: nowrap;
    }
    .btn-del-draft:hover { border-color: #d32; color: #d32; }
    .pagination { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
    .pagination button { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; }
    .pagination button.active { background: var(--green); color: #fff; border-color: var(--green); }
    .empty { color: #bbb; font-size: 13px; text-align: center; padding: 32px; }
    .title-cell { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── 自定义弹窗 ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 8000; display: flex;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,.35); opacity: 0; transition: opacity .2s;
      pointer-events: none;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: #fff; border-radius: 14px; padding: 32px 28px 24px;
      box-shadow: 0 12px 48px rgba(0,0,0,.15); max-width: 360px; width: 90%;
      transform: scale(.9); transition: transform .2s; text-align: center;
    }
    .modal-overlay.show .modal-box { transform: scale(1); }
    .modal-icon { font-size: 36px; margin-bottom: 12px; }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .modal-msg { font-size: 13px; color: var(--gray); line-height: 1.6; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1; padding: 10px; border-radius: var(--radius); font-size: 14px;
      font-weight: 600; cursor: pointer; transition: all .15s; border: none;
    }
    .modal-btn-cancel { background: var(--gray-light); color: var(--gray); }
    .modal-btn-cancel:hover { background: #eee; }
    .modal-btn-danger { background: #ff4d4f; color: #fff; }
    .modal-btn-danger:hover { background: #e03e3e; }

    /* ── 样式预览 Tab ── */
    #panel-preview { padding: 40px 24px; }
    .preview-title { text-align: center; font-size: 20px; font-weight: bold; color: #333; margin-bottom: 6px; }
    .preview-sub { text-align: center; font-size: 13px; color: #999; margin-bottom: 36px; }
    .grid {
      display: grid; gap: 20px; grid-template-columns: repeat(3, 1fr);
      max-width: 1400px; margin: 0 auto;
    }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  { .grid { grid-template-columns: 1fr; } }
    .demo-block {
      background: #fff; border-radius: 12px; padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07); min-width: 0; overflow: hidden;
    }
    .demo-label {
      display: inline-block; background: #f4f4f4; border: 1px solid #e0e0e0; color: #666;
      font-size: 11px; font-family: monospace; padding: 2px 8px; border-radius: 4px;
      margin-bottom: 16px; letter-spacing: .5px;
    }
    .divider-line { border: none; border-top: 1px dashed #ddd; margin: 0 0 16px 0; }

    /* ── 烟花 ── */
    #fireworks {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; cursor: pointer; display: none;
      background: transparent;
    }
    #fireworks.active { display: block; }
    .fw-hint {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.6); font-size: 14px; z-index: 10000;
      pointer-events: none; display: none; letter-spacing: 1px;
    }
    #fireworks.active + .fw-hint { display: block; }
  </style>
</head>
<body>

  <canvas id="fireworks" onclick="stopFireworks()"></canvas>
  <div class="fw-hint">点击任意位置关闭</div>

  <!-- 自定义确认弹窗 -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-msg" id="modalMsg"></div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
        <button class="modal-btn modal-btn-danger" id="modalConfirm">确定</button>
      </div>
    </div>
  </div>

  <!-- 登录 -->
  <div class="login-page" id="loginPage">
    <div class="login-box">
      <div class="logo">
        <img src="/logo.png" alt="Logo">
        <span>十字路口·公众号排版</span>
      </div>
      <input type="text" id="loginUser" placeholder="用户名" autocomplete="username">
      <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password">
      <button class="btn-login" onclick="doLogin()">登 录</button>
      <div class="error" id="loginError"></div>
    </div>
  </div>

  <!-- 主应用 -->
  <div class="app" id="app">
    <div class="header">
      <div class="header-left">
        <img src="/logo.png" alt="Logo">
        <span class="brand">十字路口·公众号排版</span>
        <div class="header-tabs">
          <button class="tab-btn active" onclick="switchTab('publish')">&#x1F4E4; 发布文章草稿</button>
          <button class="tab-btn" onclick="switchTab('preview')">&#x1F3A8; 样式预览</button>
        </div>
      </div>
      <div class="header-right">
        <a href="/admin.html" class="btn-text" id="adminLink" style="display:none">&#x2699;&#xFE0F; 管理后台</a>
        <span class="username" id="displayName"></span>
        <span class="admin-badge" id="adminBadge" style="display:none">管理员</span>
        <button class="btn-text" onclick="doLogout()">退出</button>
      </div>
    </div>

    <!-- Tab 1: 发布 -->
    <div class="tab-panel active" id="panel-publish">
      <div class="content">
        <div class="col-left">
          <div class="card">
            <h2>发布文章草稿</h2>
            <div class="field">
              <label>文档链接</label>
              <input type="text" class="url-input" id="urlInput" placeholder="粘贴 Notion / 飞书 公开链接">
            </div>
            <div class="field">
              <label>目标公众号</label>
              <select id="accountSelect"><option value="">加载中...</option></select>
            </div>
            <div class="field">
              <label>作者（可选）</label>
              <input type="text" id="authorInput" placeholder="文章显示的作者名">
            </div>
            <div class="field">
              <label>摘要（可选）</label>
              <input type="text" id="digestInput" placeholder="默认自动截取正文前 54 字">
            </div>
            <button class="btn-publish" id="publishBtn" onclick="doPublish()">
              <span class="progress-fill" id="progressFill"></span>
              <span id="publishBtnText">发布到草稿箱</span>
            </button>
            <div class="publish-log" id="publishLog"></div>
            <div class="status-bar" id="status"></div>
          </div>
        </div>
        <div class="col-right">
          <div class="card">
            <h3>操作记录</h3>
            <div id="logsContainer"><div class="empty">暂无记录</div></div>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab 2: 样式预览 -->
    <div class="tab-panel" id="panel-preview">
      <div class="preview-title">样式预览</div>
      <div class="preview-sub">以下为转换后发布到微信公众号的实际渲染效果</div>
      <div class="grid" id="preview-grid"></div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════
    //  样式预览数据
    // ══════════════════════════════════
    const FONT = "Optima-Regular, Optima, PingFangSC-light, PingFangTC-light, 'PingFang SC', Cambria, Cochin, Georgia, Times, 'Times New Roman', serif";
    const MONO = 'Operator Mono, Consolas, Monaco, Menlo, monospace';

    const PS = {
      wrapper:           `font-family:${FONT};font-size:15px;color:rgb(63,63,63);line-height:1.75;letter-spacing:0.1em;word-wrap:break-word;`,
      h1:                `display:block;line-height:1.5;font-size:24px;font-family:${FONT};font-weight:bold;margin:80px 0 40px 0;color:#407600;text-align:center;padding:0 1em;border-bottom:8px solid #407600;`,
      h2:                `display:block;line-height:1.5;font-family:${FONT};font-size:20px;font-weight:bold;margin:40px 0;color:#222222;text-align:center;padding:0 0.2em;`,
      h3:                `display:block;line-height:1.5;font-family:${FONT};font-size:17px;font-weight:bold;margin:40px 0;color:#222222;text-align:left;`,
      h4:                `display:block;line-height:1.5;font-family:${FONT};font-size:16px;font-weight:bold;margin:1em 0 .5em;color:#222222;text-align:left;`,
      h5:                `display:block;line-height:1.5;font-family:${FONT};font-size:15px;font-weight:bold;margin:.8em 0 .4em;color:#222222;text-align:left;`,
      h6:                `display:block;line-height:1.5;font-family:${FONT};font-size:14px;font-weight:bold;margin:.7em 0 .35em;color:#555555;text-align:left;`,
      p:                 `text-align:left;line-height:26px;font-family:${FONT};margin:0;padding-bottom:1em;letter-spacing:0.1em;white-space:pre-line;color:rgb(63,63,63);font-size:15px;`,
      strong:            `word-break:break-all;font-weight:600;color:#407600;`,
      em:                `font-style:italic;`,
      code_inline:       `background:rgba(135,131,120,.15);border-radius:4px;font-size:85%;padding:0.2em 0.4em;color:#222222;font-family:${MONO};`,
      s:                 `text-decoration:line-through;color:#888888;`,
      blockquote_wrapper:`line-height:26px;word-spacing:normal;hyphens:auto;text-align:left;outline:0;max-width:100%;border-top:none;border-right:none;border-bottom:none;display:block;overflow:auto;padding:10px;margin:20px 0;border-left:8px solid #222222;background-color:#f5f5f5;font-family:${FONT};`,
      blockquote_text:   `text-align:left;line-height:26px;font-family:${FONT};margin:0;letter-spacing:0.1em;color:#407600;font-size:15px;`,
      callout_wrapper:   `font-size:15px;white-space:normal;margin:20px 0;color:#3f3f3f;font-family:${FONT};line-height:26px;letter-spacing:0.1em;background-color:#f9fdf5;border:1px solid #407600;border-radius:8px;padding:16px 20px;`,
      code_wrapper:      `margin:20px 10px;display:block;width:calc(100% - 20px);box-sizing:border-box;font-size:15px;padding:10px;color:#333;position:relative;background-color:#fafafa;border:1px solid #f0f0f0;border-radius:5px;white-space:pre;box-shadow:rgba(0,0,0,.3) 0px 2px 10px;overflow-x:auto;text-align:left;font-family:${MONO};`,
      code_lang_bar:     `font-size:11px;color:#999;font-family:${MONO};padding-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid #f0f0f0;margin-bottom:8px;`,
      code_pre:          `margin:0;padding:0;overflow-x:auto;background:transparent;`,
      code_text:         `font-family:${MONO};font-size:14px;line-height:1.65;white-space:pre;word-break:normal;display:block;color:#333;`,
      hr:                `border-style:solid;border-width:1px 0 0;border-color:#797979;margin:15px 0;`,
      ul:                `padding-left:1.5em;font-size:15px;line-height:1.75;font-family:${FONT};vertical-align:baseline;white-space:normal;color:rgb(63,63,63);margin-bottom:8px;margin-top:0;`,
      ol:                `padding-left:1.5em;font-size:15px;line-height:26px;font-family:${FONT};vertical-align:baseline;white-space:normal;color:rgb(63,63,63);margin-bottom:8px;margin-top:0;`,
      li_ul:             `font-size:15px;line-height:26px;font-family:${FONT};list-style-position:outside;list-style-type:disc;`,
      li_ol:             `font-size:15px;line-height:1.75;font-family:${FONT};list-style-position:outside;list-style-type:decimal;`,
      li_p:              `font-family:inherit;vertical-align:baseline;margin:10px 0;`,
      img_wrapper:       `margin:15px 0;text-align:center;`,
      img:               `max-width:100%;height:auto;border-radius:10px;display:inline-block;`,
      img_caption:       `font-size:12px;color:#888888;margin-top:5px;text-align:center;`,
      video_wrapper:     `margin:1em 0;background:#111;border-radius:8px;padding:28px 20px;text-align:center;`,
      video_label:       `color:rgba(255,255,255,.45);font-size:14px;`,
      toggle_summary:    `font-size:15px;font-weight:bold;color:#222222;margin:12px 0 5px;padding-left:15px;border-left:3px solid #222222;font-family:${FONT};`,
      toggle_content:    `padding-left:15px;border-left:2px solid rgba(0,0,0,.15);margin-left:4px;`,
      table_wrapper:     `overflow-x:auto;margin:1em 0;`,
      table:             `border-collapse:collapse;width:100%;font-size:15px;line-height:1.6;font-family:${FONT};`,
      th:                `background:rgba(0,0,0,.05);padding:7px 13px;border:1px solid rgba(0,0,0,.15);font-weight:bold;text-align:left;color:#222222;`,
      td:                `padding:7px 13px;border:1px solid rgba(0,0,0,.15);color:#222222;`,
      td_even:           `padding:7px 13px;border:1px solid rgba(0,0,0,.15);color:#222222;background:rgba(0,0,0,.02);`,
      embed_wrapper:     `margin:1em 0;border:1px solid rgba(0,0,0,.1);padding:11px 15px;`,
      embed_label:       `font-size:12px;color:#888888;margin-bottom:4px;`,
      embed_link:        `font-size:13px;text-decoration:none;color:#222222;border-bottom:1px solid #222222;word-break:break-all;`,
      footnotes_wrapper: `margin-top:30px;padding-top:15px;border-top:1px solid rgba(0,0,0,.15);`,
      footnotes_title:   `font-size:12px;font-weight:bold;color:#888888;margin-bottom:.6em;text-transform:uppercase;letter-spacing:1px;`,
      footnote_item:     `font-size:12px;color:#555555;line-height:1.7;margin:.3em 0;word-break:break-all;`,
      footnote_num:      `color:#222222;font-weight:bold;margin-right:4px;`,
    };

    function demoCard(label, html) {
      return `<div class="demo-block"><span class="demo-label">${label}</span><hr class="divider-line"/><section style="${PS.wrapper}">${html}</section></div>`;
    }

    const dot = c => `<section style="width:10px;height:10px;border-radius:50%;background-color:${c};font-size:0;line-height:0;overflow:hidden;">&nbsp;</section>`;

      demoCard('embed · 嵌入链接', `<section style="${PS.embed_wrapper}"><p style="${PS.embed_label}">\uD83D\uDCCE 嵌入内容</p><p style="${PS.embed_link}">https://github.com/Zeo0811/end_to_end-layout</p></section>`),
      demoCard('footnotes · 脚注', `<p style="${PS.p}">这段文字引用了一个外部链接<sup style="font-size:.7em;color:#222222;font-weight:bold;line-height:0;vertical-align:super;">[1]</sup>，脚注会统一列在文末。</p><section style="${PS.footnotes_wrapper}"><p style="${PS.footnotes_title}">参考资料</p><p style="${PS.footnote_item}"><span style="${PS.footnote_num}">[1]</span>十字路口排版：<span style="color:#888888">https://github.com/Zeo0811/end_to_end-layout</span></p></section>`),

    // ══════════════════════════════════
    //  Tab 切换
    // ══════════════════════════════════
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      event.target.classList.add('active');
    }

    // ══════════════════════════════════
    //  应用逻辑
    // ══════════════════════════════════
    let token = localStorage.getItem('token');
    let currentUser = null;

    async function api(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(path, { ...opts, headers });
      const data = await res.json();
      if (res.status === 401) { logout(); throw new Error('登录已过期'); }
      return data;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (token) {
        try {
          const data = await api('/api/me');
          currentUser = data.user;
          showApp();
        } catch { logout(); }
      }
      document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });

    async function doLogin() {
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      if (!username || !password) return;
      try {
        const data = await api('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) });
        if (data.ok) {
          token = data.token; currentUser = data.user;
          localStorage.setItem('token', token);
          showApp();
        } else { showLoginError(data.error); }
      } catch (e) { showLoginError(e.message); }
    }

    function doLogout() {
      api('/api/logout', { method: 'POST' }).catch(() => {});
      logout();
    }

    function logout() {
      token = null; currentUser = null;
      localStorage.removeItem('token');
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }

    function showLoginError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg; el.style.display = 'block';
    }

    function showApp() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('displayName').textContent = currentUser.username;
      if (currentUser.role === 'admin') {
        document.getElementById('adminBadge').style.display = '';
        document.getElementById('adminLink').style.display = '';
      }
      loadAccounts();
      loadLogs();
    }

    async function loadAccounts() {
      const data = await api('/api/accounts');
      const select = document.getElementById('accountSelect');
      select.innerHTML = data.accounts.length
        ? data.accounts.map(a => `<option value="${esc(a.name)}">${esc(a.name)}</option>`).join('')
        : '<option value="">暂无账号</option>';
    }

    async function doPublish() {
      const url         = document.getElementById('urlInput').value.trim();
      const accountName = document.getElementById('accountSelect').value;
      const author      = document.getElementById('authorInput').value.trim();
      const digest      = document.getElementById('digestInput').value.trim();

      if (!url) return showModal({ icon: '\u270F\uFE0F', title: '提示', msg: '请输入 Notion 或飞书链接', confirmText: '知道了', confirmClass: 'modal-btn-cancel' });
      if (!accountName) return showModal({ icon: '\u{1F4E2}', title: '提示', msg: '请先选择目标公众号', confirmText: '知道了', confirmClass: 'modal-btn-cancel' });

      const btn = document.getElementById('publishBtn');
      const btnText = document.getElementById('publishBtnText');
      const fill = document.getElementById('progressFill');
      const logEl = document.getElementById('publishLog');

      btn.disabled = true;
      btn.classList.add('publishing');
      fill.style.width = '5%';
      btnText.textContent = '准备中...';
      logEl.innerHTML = '';
      setStatus('', '');

      function addLog(msg) {
        const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        logEl.innerHTML += `<div class="log-line"><span class="log-time">${now}</span><span class="log-msg">${esc(msg)}</span></div>`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      addLog('开始发布任务...');

      try {
        const res = await fetch('/api/publish', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify({ url, accountName, author, digest }),
        });

        // 检查是否是 SSE 流
        const contentType = res.headers.get('content-type') || '';
        if (contentType.includes('text/event-stream')) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            const lines = buffer.split('\n');
            buffer = lines.pop(); // 保留未完成的行

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const data = JSON.parse(line.slice(6));
                if (data.type === 'progress') {
                  fill.style.width = data.percent + '%';
                  btnText.textContent = data.msg;
                  addLog(data.msg);
                } else if (data.type === 'done') {
                  if (data.ok) {
                    fill.style.width = '100%';
                    btnText.textContent = '发布成功!';
                    addLog(`\u2705 草稿创建成功: ${data.title}`);
                    setStatus('success', `\u{1F389} 发布成功！「${esc(data.title)}」已保存到草稿箱`);
                    document.getElementById('urlInput').value = '';
                    document.getElementById('authorInput').value = '';
                    document.getElementById('digestInput').value = '';
                    launchFireworks();
                  } else {
                    addLog(`\u274C 失败: ${data.error}`);
                    setStatus('error', `失败: ${esc(data.error)}`);
                  }
                }
              } catch (_) {}
            }
          }
        } else {
          // fallback: 普通 JSON 响应
          const data = await res.json();
          if (data.ok) {
            fill.style.width = '100%';
            setStatus('success', `\u{1F389} 发布成功！「${esc(data.title)}」已保存到草稿箱`);
            document.getElementById('urlInput').value = '';
            document.getElementById('authorInput').value = '';
            document.getElementById('digestInput').value = '';
            launchFireworks();
          } else {
            setStatus('error', `失败: ${esc(data.error)}`);
          }
        }
      } catch (e) {
        addLog(`\u274C 请求异常: ${e.message}`);
        setStatus('error', `请求异常: ${e.message}`);
      } finally {
        btn.disabled = false;
        btn.classList.remove('publishing');
        setTimeout(() => {
          fill.style.width = '0';
          btnText.textContent = '发布到草稿箱';
        }, 2000);
        loadLogs();
      }
    }

    async function deleteDraft(logId, accountName, mediaId) {
      const ok = await showModal({
        icon: '\u{1F5D1}\uFE0F',
        title: '删除草稿',
        msg: '确定从公众号草稿箱中删除这篇文章？此操作不可撤销。',
        confirmText: '删除',
      });
      if (!ok) return;
      try {
        const data = await api('/api/delete-draft', {
          method: 'POST',
          body: JSON.stringify({ logId, accountName, mediaId }),
        });
        if (data.ok) loadLogs();
        else setStatus('error', '\u274C 删除失败: ' + data.error);
      } catch (e) { setStatus('error', '\u274C 删除失败: ' + e.message); }
    }

    async function loadLogs(page = 1) {
      const data = await api(`/api/logs?page=${page}&pageSize=15`);
      const container  = document.getElementById('logsContainer');
      const pagination = document.getElementById('pagination');

      if (!data.rows.length) {
        container.innerHTML = '<div class="empty">暂无记录</div>';
        pagination.innerHTML = '';
        return;
      }

      container.innerHTML = `<table>
        <thead><tr><th>时间</th><th>操作人</th><th>文章</th><th>公众号</th><th>状态</th><th></th></tr></thead>
        <tbody>${data.rows.map(r => `<tr>
          <td style="white-space:nowrap">${esc(r.created_at)}</td>
          <td>${esc(r.operator)}</td>
          <td class="title-cell" title="${esc(r.url)}">${esc(r.title || '-')}</td>
          <td>${esc(r.account_name)}</td>
          <td>${r.status === 'success'
            ? '<span class="tag tag-ok">\u2705 成功</span>'
            : r.status === 'deleted'
              ? '<span class="tag tag-del">\u{1F5D1} 已删除</span>'
              : `<span class="tag tag-err" title="${esc(r.error_msg)}">\u274C 失败</span>`
          }</td>
          <td>${r.status === 'success' && r.media_id
            ? `<button class="btn-del-draft" onclick="deleteDraft(${r.id},'${esc(r.account_name)}','${esc(r.media_id)}')">\u{1F5D1} 删除草稿</button>`
            : ''
          }</td>
        </tr>`).join('')}</tbody></table>`;

      const total = Math.ceil(data.total / data.pageSize);
      if (total > 1) {
        pagination.innerHTML = Array.from({ length: Math.min(total, 10) }, (_, i) =>
          `<button class="${i + 1 === page ? 'active' : ''}" onclick="loadLogs(${i + 1})">${i + 1}</button>`
        ).join('');
      } else { pagination.innerHTML = ''; }
    }

    // ── 烟花（全屏持续，点击关闭）──
    let fwAnimId = null;
    let fwParticles = [];
    let fwRunning = false;

    function launchFireworks() {
      const canvas = document.getElementById('fireworks');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.classList.add('active');
      fwParticles = [];
      fwRunning = true;

      const colors = [
        '#ff6b6b','#ff3e3e','#ffd93d','#ffb347','#6bcb77','#2ecc71',
        '#4d96ff','#3b7dff','#ff6bff','#e84393','#00cec9','#fdcb6e',
        '#407600','#a29bfe','#fd79a8','#fab1a0','#55efc4','#74b9ff'
      ];

      function addBurst() {
        if (!fwRunning) return;
        const cx = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
        const cy = Math.random() * canvas.height * 0.5 + canvas.height * 0.05;
        const count = 60 + Math.random() * 60;
        const burstColor = colors[Math.floor(Math.random() * colors.length)];
        // 每次爆炸用 2-3 种颜色
        const palette = [burstColor];
        for (let c = 0; c < 2; c++) palette.push(colors[Math.floor(Math.random() * colors.length)]);

        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
          const speed = 3 + Math.random() * 7;
          fwParticles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1,
            life: 1,
            decay: 0.006 + Math.random() * 0.012,
            color: palette[Math.floor(Math.random() * palette.length)],
            size: 2.5 + Math.random() * 3.5,
            trail: [],
          });
        }
      }

      // 初始多次爆炸
      for (let i = 0; i < 4; i++) setTimeout(() => addBurst(), i * 200);
      // 持续每 600-1200ms 一次新爆炸
      const burstInterval = setInterval(() => {
        if (!fwRunning) { clearInterval(burstInterval); return; }
        addBurst();
        if (Math.random() > 0.5) setTimeout(addBurst, 150); // 偶尔双连发
      }, 600 + Math.random() * 600);

      function animate() {
        if (!fwRunning) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          canvas.classList.remove('active');
          return;
        }
        // 半透明黑底产生拖尾效果
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = fwParticles.length - 1; i >= 0; i--) {
          const p = fwParticles[i];
          p.life -= p.decay;
          if (p.life <= 0) { fwParticles.splice(i, 1); continue; }

          p.vy += 0.04; // 重力
          p.vx *= 0.985;
          p.x += p.vx;
          p.y += p.vy;

          // 发光效果
          const glow = p.size * p.life * 2;
          ctx.globalAlpha = p.life * 0.3;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, glow, 0, Math.PI * 2);
          ctx.fill();

          // 核心粒子
          ctx.globalAlpha = Math.min(1, p.life * 1.5);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();

          // 闪烁的小火花
          if (Math.random() > 0.92 && p.life > 0.3) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(p.x + (Math.random() - 0.5) * 4, p.y + (Math.random() - 0.5) * 4, 1, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.globalAlpha = 1;
        fwAnimId = requestAnimationFrame(animate);
      }
      animate();
    }

    function stopFireworks() {
      fwRunning = false;
      if (fwAnimId) cancelAnimationFrame(fwAnimId);
      const canvas = document.getElementById('fireworks');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.classList.remove('active');
      fwParticles = [];
    }

    // ── 自定义弹窗 ──
    let modalResolve = null;

    function showModal({ icon, title, msg, confirmText, confirmClass }) {
      document.getElementById('modalIcon').textContent = icon || '\u26A0\uFE0F';
      document.getElementById('modalTitle').textContent = title || '确认操作';
      document.getElementById('modalMsg').textContent = msg || '';
      const confirmBtn = document.getElementById('modalConfirm');
      confirmBtn.textContent = confirmText || '确定';
      confirmBtn.className = 'modal-btn ' + (confirmClass || 'modal-btn-danger');
      document.getElementById('modalOverlay').classList.add('show');
      return new Promise(resolve => {
        modalResolve = resolve;
        confirmBtn.onclick = () => {
          document.getElementById('modalOverlay').classList.remove('show');
          modalResolve = null;
          resolve(true);
        };
      });
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      if (modalResolve) {
        const r = modalResolve;
        modalResolve = null;
        r(false);
      }
    }

    function setStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = 'status-bar ' + type;
      el.innerHTML = msg;
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
